<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Making Waves Audio Analysis (Bootstrap)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Source+Serif+4:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    <style>
        :root {
            --mw-bg: #f6f3ee;
            --mw-ink: #1a1a1a;
            --mw-accent: #d18b2c;
            --mw-accent-2: #1b6b7a;
        }

        body {
            font-family: "Space Grotesk", sans-serif;
            color: var(--mw-ink);
            background: radial-gradient(circle at 15% 20%, #ffffff 0%, #f6f3ee 45%, #efe8dd 100%);
            min-height: 100vh;
        }

        h1, h2, h3 {
            font-family: "Source Serif 4", serif;
        }

        .mw-card {
            border: 1px solid #e4ddd1;
            background: #ffffff;
            box-shadow: 0 12px 30px rgba(20, 20, 20, 0.08);
        }

        .mw-chip {
            border-radius: 999px;
            padding: 0.1rem 0.7rem;
            background: #f2e6d6;
            font-weight: 600;
        }

        .mw-canvas {
            height: 240px;
        }

        .mw-accordion-button {
            font-weight: 600;
        }

        .mw-muted {
            color: #6d6a65;
        }

        .mw-legend {
            font-size: 0.9rem;
        }

        .mw-tuner-card {
            padding: 1rem;
        }

        .mw-tuner-label {
            font-weight: 600;
        }

        .mw-tuner-value {
            font-size: clamp(1.4rem, 4vw, 2.4rem);
            font-weight: 600;
        }

        .mw-tuner-period {
            font-size: clamp(1.8rem, 4.8vw, 2.7rem);
            font-weight: 600;
        }

        .mw-tuner-secondary {
            font-size: clamp(1.05rem, 3vw, 1.45rem);
            color: #4f4c48;
        }

        .mw-tuner-note {
            font-size: clamp(1.7rem, 4.6vw, 2.8rem);
            font-weight: 600;
        }

        .mw-tuner-accidental {
            font-size: clamp(1.2rem, 3.6vw, 1.6rem);
        }

        .mw-tuner-indicator-group {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.18rem;
            width: 2.6em;
        }

        .mw-tuner-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            opacity: 0.15;
            transition: opacity 0.15s ease;
        }

        .mw-tuner-dot-flat {
            background: #c8513a;
        }

        .mw-tuner-dot-sharp {
            background: #2f8f5b;
        }

        .mw-tuner-dot-active {
            opacity: 0.7;
        }

        .mw-tuner-dot-strong {
            opacity: 1;
        }

        .mw-confidence-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 0.4rem;
            vertical-align: middle;
            background: #b6b1a8;
            opacity: 0.6;
            transition: background 0.2s ease, opacity 0.2s ease;
        }

        .mw-confidence-low {
            background: #c6b092;
            opacity: 0.8;
        }

        .mw-confidence-mid {
            background: #d18b2c;
            opacity: 0.9;
        }

        .mw-confidence-high {
            background: #2f8f5b;
            opacity: 1;
        }

        .mw-confidence-off {
            opacity: 0.2;
        }

        @media (max-width: 576px) {
            .mw-tuner-card {
                padding: 0.65rem;
            }

            #tunerContainer .row {
                --bs-gutter-y: 0.5rem;
                --bs-gutter-x: 0.75rem;
            }
        }

        .mw-logo {
            width: 180px;
            height: auto;
        }

        .form-range::-webkit-slider-thumb {
            background-color: var(--mw-accent-2);
        }

        .form-range::-moz-range-thumb {
            background-color: var(--mw-accent-2);
        }
    </style>
</head>
<body>
    <header class="container py-4">
        <div class="d-flex flex-column flex-md-row align-items-center justify-content-between gap-3">
            <a href="https://makingwaveseducation.com" target="_blank" rel="noopener" class="text-decoration-none">
                <img src="making-waves-logo.png" alt="Making Waves Logo" class="mw-logo">
            </a>
            <div class="d-flex align-items-center gap-3">
                <button id="startButton" class="btn btn-lg btn-primary">Start</button>
                <button id="resetButton" class="btn btn-lg btn-outline-secondary">Stop/Reset</button>
                <span class="mw-chip">Audio Analysis Lab</span>
            </div>
        </div>
    </header>

    <main class="container pb-5">
        <div class="accordion" id="mwAccordion">
            <div class="accordion-item mw-card mb-3">
                <h2 class="accordion-header" id="headingTuner">
                    <button class="accordion-button mw-accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTuner" aria-expanded="false" aria-controls="collapseTuner">
                        Tuner
                    </button>
                </h2>
                <div id="collapseTuner" class="accordion-collapse collapse" aria-labelledby="headingTuner">
                    <div class="accordion-body" id="tunerContainer">
                        <div class="row g-2">
                            <div class="col-6 col-md-6">
                                <div class="mw-tuner-card border rounded-3 bg-light">
                                    <div class="mw-tuner-label">Period</div>
                                    <div class="mw-tuner-period">
                                        <span id="peakPeriod">0</span> ms
                                    </div>
                                    <div class="mw-tuner-secondary">Frequency: <span id="peakFrequency">0</span> Hz</div>
                                </div>
                            </div>
                            <div class="col-6 col-md-6">
                                <div class="mw-tuner-card border rounded-3 bg-light text-center">
                                    <div class="mw-tuner-label">
                                        Note
                                        <span id="tunerConfidence" class="mw-confidence-dot mw-confidence-off" aria-hidden="true"></span>
                                    </div>
                                    <div class="d-flex align-items-center justify-content-center gap-3 mt-2">
                                        <span id="flatDots" class="mw-tuner-accidental mw-tuner-indicator-group">
                                            <span class="mw-tuner-dot mw-tuner-dot-flat"></span>
                                            <span class="mw-tuner-dot mw-tuner-dot-flat"></span>
                                            <span class="mw-tuner-dot mw-tuner-dot-flat"></span>
                                        </span>
                                        <span id="noteName" class="mw-tuner-note">--</span>
                                        <span id="sharpDots" class="mw-tuner-accidental mw-tuner-indicator-group">
                                            <span class="mw-tuner-dot mw-tuner-dot-sharp"></span>
                                            <span class="mw-tuner-dot mw-tuner-dot-sharp"></span>
                                            <span class="mw-tuner-dot mw-tuner-dot-sharp"></span>
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="accordion-item mw-card mb-3">
                <h2 class="accordion-header" id="headingScope">
                    <button class="accordion-button mw-accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseScope" aria-expanded="false" aria-controls="collapseScope">
                        Oscilloscope
                    </button>
                </h2>
                <div id="collapseScope" class="accordion-collapse collapse" aria-labelledby="headingScope">
                    <div class="accordion-body" id="oscilloscopeContainer">
                        <div class="mw-canvas mb-3">
                            <canvas id="oscilloscope"></canvas>
                        </div>

                        <div class="card border-0 bg-light">
                            <div class="card-body">
                                <button class="btn btn-outline-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#collapseAdvanced" aria-expanded="false" aria-controls="collapseAdvanced">
                                    Advanced Controls
                                </button>
                                <div class="collapse mt-3" id="collapseAdvanced">
                                    <div class="row g-3 align-items-center">
                                        <div class="col-12 col-md-6">
                                            <label for="xZoom" class="form-label">X Zoom (time)</label>
                                            <input type="range" id="xZoom" class="form-range" min="-2.00" max="0.75" value="-1.0" step="0.05">
                                        </div>
                                        <div class="col-12 col-md-6">
                                            <label for="yZoom" class="form-label">Y Zoom (amplitude)</label>
                                            <input type="range" id="yZoom" class="form-range" min="0" max="2" value="1" step="0.05">
                                        </div>
                                        <div class="col-12">
                                            <button id="cursorButton" class="btn btn-outline-primary">Show Cursors</button>
                                        </div>
                                    </div>
                                    <p class="mw-legend mw-muted mt-3">Tip: set X Zoom, enable cursors, then measure one full period.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="accordion-item mw-card mb-3">
                <h2 class="accordion-header" id="headingSpectrum">
                    <button class="accordion-button mw-accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseSpectrum" aria-expanded="false" aria-controls="collapseSpectrum">
                        Spectrum Analyzer
                    </button>
                </h2>
                <div id="collapseSpectrum" class="accordion-collapse collapse" aria-labelledby="headingSpectrum">
                    <div class="accordion-body" id="spectrumAnalyzerContainer">
                        <div class="mw-canvas">
                            <canvas id="spectrumAnalyzer"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const peakFrequencyDisplay = document.getElementById('peakFrequency');
        const peakPeriodDisplay = document.getElementById('peakPeriod');
        const noteNameDisplay = document.getElementById('noteName');
        const flatDots = document.getElementById('flatDots');
        const sharpDots = document.getElementById('sharpDots');
        const oscilloscopeCanvas = document.getElementById('oscilloscope');
        const spectrumCanvas = document.getElementById('spectrumAnalyzer');
        const tunerConfidenceDot = document.getElementById('tunerConfidence');
        const xZoomSlider = document.getElementById('xZoom');
        const yZoomSlider = document.getElementById('yZoom');
        const startButton = document.getElementById('startButton');
        const resetButton = document.getElementById('resetButton');
        const cursorButton = document.getElementById('cursorButton');

        const tunerConfig = {
            mode: 'yin',
            minFrequency: 60,
            maxFrequency: 4000,
            yinThreshold: 0.15,
            pitchUpdateIntervalMs: 150,
            smoothingWindow: 5,
            emaAlpha: 0.2
        };

        let audioContext;
        let isRunning = false;
        let cursorVisible = false;
        let analyser, timeDomainData, frequencyData;
        let oscilloscopeChart, spectrumChart;
        let draggingCursor = null;
        let mediaStream = null;
        let mediaSource = null;
        let animationFrameId = null;

        initializeCharts();

        document.addEventListener('DOMContentLoaded', () => {
            if (window.matchMedia('(min-width: 992px)').matches) {
                document.querySelectorAll('.accordion-collapse').forEach((panel) => {
                    panel.classList.add('show');
                });
            }
        });

        async function setupAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });

                if (!mediaStream.active) {
                    throw new Error('Microphone stream is not active.');
                }

                await new Promise(resolve => setTimeout(resolve, 500));

                mediaSource = audioContext.createMediaStreamSource(mediaStream);
                analyser = audioContext.createAnalyser();

                analyser.fftSize = 8192;
                analyser.smoothingTimeConstant = 0.9;
                timeDomainData = new Float32Array(analyser.fftSize);
                frequencyData = new Float32Array(analyser.frequencyBinCount);

                mediaSource.connect(analyser);
                startUpdatingCharts();
            } catch (error) {
                console.error('Error accessing microphone or initializing audio:', error);
                alert('Microphone access is required for this application to work.');
            }
        }

        async function ensureMediaStream() {
            if (mediaStream && mediaStream.active) {
                return;
            }

            if (mediaSource) {
                mediaSource.disconnect();
                mediaSource = null;
            }

            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }

            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            if (!mediaStream.active) {
                throw new Error('Microphone stream is not active.');
            }

            mediaSource = audioContext.createMediaStreamSource(mediaStream);
            mediaSource.connect(analyser);
        }

        async function resetAudio() {
            stopUpdatingCharts();

            if (mediaSource) {
                mediaSource.disconnect();
                mediaSource = null;
            }

            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            if (audioContext) {
                await audioContext.close();
                audioContext = null;
            }

            isRunning = false;
            startButton.textContent = 'Start';

            oscilloscopeChart.data.labels = [];
            oscilloscopeChart.data.datasets[0].data = [];
            spectrumChart.data.labels = [];
            spectrumChart.data.datasets[0].data = [];
            oscilloscopeChart.update();
            spectrumChart.update();

            peakFrequencyDisplay.textContent = '0';
            peakPeriodDisplay.textContent = '0';
            noteNameDisplay.textContent = '--';
            updateAccidentalIndicators(null);

            updateCharts.tunerBuffer = [];
            updateCharts.lastUpdateTime = null;
            updateCharts.lastPitchTime = null;
            updateCharts.lastPitchFrequency = null;
            updateCharts.emaFrequency = null;
            updateCharts.lastConfidence = null;

            setConfidenceDot(null);
        }

        function initializeCharts() {
            try {
                const oscilloscopeCtx = oscilloscopeCanvas.getContext('2d');
                oscilloscopeChart = new Chart(oscilloscopeCtx, {
                    type: 'line',
                    data: {
                        datasets: [{
                            label: 'Oscilloscope',
                            data: [],
                            borderColor: '#1b6b7a',
                            borderWidth: 2,
                            pointRadius: 0,
                            tension: 0.1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: false,
                        scales: {
                            x: {
                                type: 'linear',
                                min: 0,
                                max: 10,
                                title: { display: true, text: 'Time (ms)' }
                            },
                            y: {
                                type: 'linear',
                                min: -0.1,
                                max: 0.1,
                                title: { display: true, text: 'Amplitude' },
                                ticks: { display: false }
                            }
                        },
                        plugins: {
                            legend: { display: false },
                            zoom: {
                                zoom: {
                                    wheel: { enabled: false },
                                    pinch: { enabled: false },
                                    mode: 'xy'
                                }
                            },
                            annotation: {
                                annotations: {
                                    cursor1: {
                                        type: 'line',
                                        xMin: 2,
                                        xMax: 2,
                                        display: false,
                                        borderColor: '#d14b4b',
                                        borderWidth: 2,
                                        label: {
                                            content: 'Cursor 1: X = 2',
                                            enabled: true,
                                            display: false,
                                            position: 'start',
                                            backgroundColor: '#d14b4b'
                                        }
                                    },
                                    cursor2: {
                                        type: 'line',
                                        xMin: 8,
                                        xMax: 8,
                                        display: false,
                                        borderColor: '#2f8f5b',
                                        borderWidth: 2,
                                        label: {
                                            content: 'Cursor 2: X = 8',
                                            enabled: true,
                                            display: false,
                                            position: 'start',
                                            backgroundColor: '#2f8f5b'
                                        }
                                    },
                                    range: {
                                        type: 'line',
                                        xMin: 2,
                                        xMax: 8,
                                        yMin: 0,
                                        yMax: 0,
                                        display: false,
                                        borderColor: '#d18b2c',
                                        borderWidth: 2,
                                        label: {
                                            content: '6.00 ms',
                                            enabled: true,
                                            display: true,
                                            position: 'middle',
                                            backgroundColor: '#d18b2c'
                                        }
                                    }
                                }
                            }
                        }
                    }
                });

                const spectrumCtx = spectrumCanvas.getContext('2d');
                spectrumChart = new Chart(spectrumCtx, {
                    type: 'line',
                    data: {
                        datasets: [{
                            label: 'Spectrum',
                            data: [],
                            borderColor: '#d18b2c',
                            borderWidth: 2,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: false,
                        scales: {
                            x: {
                                type: 'logarithmic',
                                min: 20,
                                max: 20000,
                                title: { display: true, text: 'Frequency (Hz)' }
                            },
                            y: {
                                type: 'linear',
                                title: { display: true, text: 'Amplitude' },
                                ticks: { display: false }
                            }
                        },
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });
            } catch (error) {
                console.error('Error initializing charts:', error);
                alert('An error occurred while initializing the charts.');
            }
        }

        function startUpdatingCharts() {
            if (!analyser || !oscilloscopeChart || !spectrumChart) {
                setTimeout(startUpdatingCharts, 100);
                return;
            }

            if (updateCharts.isActive) {
                return;
            }

            updateCharts.isActive = true;
            updateCharts();
        }

        function stopUpdatingCharts() {
            updateCharts.isActive = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }

        function updateCharts() {
            try {
                analyser.getFloatTimeDomainData(timeDomainData);

                let zeroCrossingIndex = 0;
                for (let i = 1; i < timeDomainData.length; i++) {
                    if (timeDomainData[i - 1] <= 0 && timeDomainData[i] > 0) {
                        zeroCrossingIndex = i;
                        break;
                    }
                }

                const adjustedTimeDomainData = timeDomainData.slice(zeroCrossingIndex);
                const sampleRate = audioContext.sampleRate;
                const timeLabels = Array.from({ length: adjustedTimeDomainData.length }, (_, i) => (i / sampleRate) * 1000);

                oscilloscopeChart.data.labels = timeLabels;
                oscilloscopeChart.data.datasets[0].data = Array.from(adjustedTimeDomainData);
                oscilloscopeChart.update();

                analyser.getFloatFrequencyData(frequencyData);
                spectrumChart.data.labels = Array.from({ length: frequencyData.length }, (_, i) => i * (audioContext.sampleRate / 2) / frequencyData.length);
                spectrumChart.data.datasets[0].data = Array.from(frequencyData);
                spectrumChart.update();

                if (!updateCharts.lastPitchTime) {
                    updateCharts.lastPitchTime = performance.now();
                }

                const pitchTime = performance.now();
                if (pitchTime - updateCharts.lastPitchTime >= tunerConfig.pitchUpdateIntervalMs) {
                    let detectedPitch = null;

                    if (tunerConfig.mode === 'peak') {
                        detectedPitch = {
                            frequency: computePeakFrequency(frequencyData, audioContext.sampleRate),
                            confidence: 1
                        };
                    } else {
                        detectedPitch = computeYinPitch(timeDomainData, audioContext.sampleRate, tunerConfig);
                    }

                    updateCharts.lastPitchFrequency = updateSmoothedFrequency(detectedPitch?.frequency ?? null);
                    updateCharts.lastConfidence = detectedPitch?.confidence ?? null;
                    updateCharts.lastPitchTime = pitchTime;
                }

                const smoothedFrequency = updateCharts.lastPitchFrequency || 0;
                const peakPeriod = (smoothedFrequency > 0) ? (1000 / smoothedFrequency) : 0;

                if (!updateCharts.lastUpdateTime) {
                    updateCharts.lastUpdateTime = performance.now();
                }
                const currentTime = performance.now();
                if (currentTime - updateCharts.lastUpdateTime >= 500) {
                    peakFrequencyDisplay.textContent = smoothedFrequency.toFixed(0);
                    peakPeriodDisplay.textContent = peakPeriod.toFixed(2);

                    if (smoothedFrequency > 0) {
                        const noteInfo = identifyNote(smoothedFrequency);
                        const noteName = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'][noteInfo.noteIndex];

                        noteNameDisplay.textContent = noteName;
                        setConfidenceDot(updateCharts.lastConfidence);
                        updateAccidentalIndicators(noteInfo.centsOff);
                    } else {
                        noteNameDisplay.textContent = '--';
                        updateAccidentalIndicators(null);
                        setConfidenceDot(null);
                    }

                    updateCharts.lastUpdateTime = currentTime;
                }

                if (updateCharts.isActive) {
                    animationFrameId = requestAnimationFrame(updateCharts);
                }
            } catch (error) {
                console.error('Error updating charts:', error);
            }
        }

        function identifyNote(frequency) {
            const A0 = 27.5;
            const SEMITONE_RATIO = Math.pow(2, 1 / 12);

            const semitonesFromA0 = Math.round(12 * Math.log2(frequency / A0));
            const noteIndex = (semitonesFromA0 + 9) % 12;
            const octave = Math.floor((semitonesFromA0 + 9) / 12);
            const closestNoteFrequency = A0 * Math.pow(SEMITONE_RATIO, semitonesFromA0);
            const centsOff = Math.round(1200 * Math.log2(frequency / closestNoteFrequency));

            return { noteIndex, octave, centsOff };
        }

        function computePeakFrequency(spectrumData, sampleRate) {
            let maxAmplitude = -Infinity;
            let maxIndex = 0;
            for (let i = 1; i < spectrumData.length - 1; i++) {
                if (spectrumData[i] > maxAmplitude) {
                    maxAmplitude = spectrumData[i];
                    maxIndex = i;
                }
            }

            let refinedIndex = maxIndex;
            if (maxIndex > 0 && maxIndex < spectrumData.length - 1) {
                const x0 = spectrumData[maxIndex - 1];
                const x1 = spectrumData[maxIndex];
                const x2 = spectrumData[maxIndex + 1];
                refinedIndex = maxIndex + (x2 - x0) / (2 * (2 * x1 - x2 - x0));
            }

            const nyquist = sampleRate / 2;
            return (refinedIndex / spectrumData.length) * nyquist;
        }

        function computeYinPitch(samples, sampleRate, config) {
            const maxTau = Math.min(
                Math.floor(sampleRate / config.minFrequency),
                Math.floor(samples.length / 2)
            );
            const minTau = Math.max(2, Math.floor(sampleRate / config.maxFrequency));

            if (maxTau <= minTau) {
                return null;
            }

            const yinBuffer = new Float32Array(maxTau + 1);
            for (let tau = 1; tau <= maxTau; tau++) {
                let sum = 0;
                for (let i = 0; i < samples.length - tau; i++) {
                    const delta = samples[i] - samples[i + tau];
                    sum += delta * delta;
                }
                yinBuffer[tau] = sum;
            }

            yinBuffer[0] = 1;
            let runningSum = 0;
            for (let tau = 1; tau <= maxTau; tau++) {
                runningSum += yinBuffer[tau];
                yinBuffer[tau] = runningSum > 0 ? (yinBuffer[tau] * tau) / runningSum : 1;
            }

            let tauEstimate = null;
            for (let tau = minTau; tau <= maxTau; tau++) {
                if (yinBuffer[tau] < config.yinThreshold) {
                    while (tau + 1 <= maxTau && yinBuffer[tau + 1] < yinBuffer[tau]) {
                        tau++;
                    }
                    tauEstimate = tau;
                    break;
                }
            }

            if (!tauEstimate) {
                return null;
            }

            let betterTau = tauEstimate;
            if (tauEstimate > 1 && tauEstimate < maxTau) {
                const s0 = yinBuffer[tauEstimate - 1];
                const s1 = yinBuffer[tauEstimate];
                const s2 = yinBuffer[tauEstimate + 1];
                const denom = (2 * s1 - s2 - s0);
                if (denom !== 0) {
                    betterTau = tauEstimate + (s2 - s0) / (2 * denom);
                }
            }

            const frequency = sampleRate / betterTau;
            if (frequency < config.minFrequency || frequency > config.maxFrequency) {
                return null;
            }

            const confidence = Math.max(0, Math.min(1, 1 - yinBuffer[Math.round(tauEstimate)]));
            return { frequency, confidence };
        }

        function updateSmoothedFrequency(frequency) {
            if (!Number.isFinite(frequency) || frequency <= 0) {
                return updateCharts.lastPitchFrequency || 0;
            }

            if (!updateCharts.tunerBuffer) {
                updateCharts.tunerBuffer = [];
            }

            const buffer = updateCharts.tunerBuffer;
            buffer.push(frequency);
            if (buffer.length > tunerConfig.smoothingWindow) {
                buffer.shift();
            }

            const sorted = [...buffer].sort((a, b) => a - b);
            const median = sorted[Math.floor(sorted.length / 2)];
            if (updateCharts.emaFrequency === null || updateCharts.emaFrequency === undefined) {
                updateCharts.emaFrequency = median;
            } else {
                updateCharts.emaFrequency = tunerConfig.emaAlpha * median + (1 - tunerConfig.emaAlpha) * updateCharts.emaFrequency;
            }

            return updateCharts.emaFrequency;
        }

        function updateAccidentalIndicators(centsOff) {
            const flatIndicators = flatDots ? Array.from(flatDots.querySelectorAll('.mw-tuner-dot')) : [];
            const sharpIndicators = sharpDots ? Array.from(sharpDots.querySelectorAll('.mw-tuner-dot')) : [];

            for (const dot of flatIndicators) {
                dot.classList.remove('mw-tuner-dot-active', 'mw-tuner-dot-strong');
            }
            for (const dot of sharpIndicators) {
                dot.classList.remove('mw-tuner-dot-active', 'mw-tuner-dot-strong');
            }

            if (!Number.isFinite(centsOff)) {
                return;
            }

            const absCents = Math.abs(centsOff);
            let dotCount = 0;
            if (absCents > 40) {
                dotCount = 3;
            } else if (absCents > 25) {
                dotCount = 2;
            } else if (absCents > 10) {
                dotCount = 1;
            }

            if (dotCount === 0) {
                return;
            }

            const dotsToFill = centsOff < 0
                ? [flatIndicators[2], flatIndicators[1], flatIndicators[0]]
                : [sharpIndicators[0], sharpIndicators[1], sharpIndicators[2]];

            for (let i = 0; i < dotCount; i++) {
                const dot = dotsToFill[i];
                if (!dot) {
                    continue;
                }
                if (dotCount >= 3 || i < dotCount - 1) {
                    dot.classList.add('mw-tuner-dot-strong');
                } else {
                    dot.classList.add('mw-tuner-dot-active');
                }
            }
        }

        function setConfidenceDot(confidence) {
            if (!tunerConfidenceDot) {
                return;
            }

            tunerConfidenceDot.classList.remove('mw-confidence-low', 'mw-confidence-mid', 'mw-confidence-high', 'mw-confidence-off');

            if (!Number.isFinite(confidence)) {
                tunerConfidenceDot.classList.add('mw-confidence-off');
                return;
            }

            if (confidence >= 0.8) {
                tunerConfidenceDot.classList.add('mw-confidence-high');
            } else if (confidence >= 0.6) {
                tunerConfidenceDot.classList.add('mw-confidence-mid');
            } else {
                tunerConfidenceDot.classList.add('mw-confidence-low');
            }
        }

        xZoomSlider.addEventListener('input', () => {
            const maxVisibleMilliseconds = 10 ** (-xZoomSlider.value);
            oscilloscopeChart.options.scales.x.max = Math.min(maxVisibleMilliseconds, oscilloscopeChart.data.labels[oscilloscopeChart.data.labels.length - 1]);
            oscilloscopeChart.update();
        });

        yZoomSlider.addEventListener('input', () => {
            const amplitudeRange = 10 ** (-yZoomSlider.value);
            oscilloscopeChart.options.scales.y.min = -amplitudeRange;
            oscilloscopeChart.options.scales.y.max = amplitudeRange;
            oscilloscopeChart.update();
        });

        startButton.addEventListener('click', async () => {
            if (!audioContext) {
                await setupAudio();
                isRunning = true;
                startButton.textContent = 'Pause';
                return;
            }

            if (isRunning) {
                await audioContext.suspend();
                stopUpdatingCharts();
                isRunning = false;
                startButton.textContent = 'Run';
                return;
            }

            await audioContext.resume();
            await ensureMediaStream();
            startUpdatingCharts();
            isRunning = true;
            startButton.textContent = 'Pause';
        });

        resetButton.addEventListener('click', async () => {
            await resetAudio();
        });

        cursorButton.addEventListener('click', () => {
            const xMax = oscilloscopeChart.options.scales.x.max;
            const cursor1Annotation = oscilloscopeChart.options.plugins.annotation.annotations.cursor1;
            const cursor2Annotation = oscilloscopeChart.options.plugins.annotation.annotations.cursor2;
            const rangeAnnotation = oscilloscopeChart.options.plugins.annotation.annotations.range;
            cursor1Annotation.xMin = xMax * 0.2;
            cursor1Annotation.xMax = xMax * 0.2;
            cursor2Annotation.xMin = xMax * 0.8;
            cursor2Annotation.xMax = xMax * 0.8;
            rangeAnnotation.xMin = xMax * 0.2;
            rangeAnnotation.xMax = xMax * 0.8;

            if (!cursorVisible) {
                cursor1Annotation.display = true;
                cursor2Annotation.display = true;
                rangeAnnotation.display = true;
                cursorButton.textContent = 'Hide Cursors';
                cursorVisible = true;
            } else {
                cursor1Annotation.display = false;
                cursor2Annotation.display = false;
                rangeAnnotation.display = false;
                cursorButton.textContent = 'Show Cursors';
                cursorVisible = false;
            }

            oscilloscopeChart.update();
        });

        oscilloscopeCanvas.addEventListener('mousedown', (event) => {
            event.preventDefault();
            const xValue = oscilloscopeChart.scales.x.getValueForPixel(event.offsetX);
            const cursor1X = oscilloscopeChart.options.plugins.annotation.annotations.cursor1.xMin;
            const cursor2X = oscilloscopeChart.options.plugins.annotation.annotations.cursor2.xMin;

            if (Math.abs(xValue - cursor1X) < 0.1) {
                draggingCursor = 'cursor1';
            } else if (Math.abs(xValue - cursor2X) < 0.1) {
                draggingCursor = 'cursor2';
            }
        });

        oscilloscopeCanvas.addEventListener('mousemove', (event) => {
            event.preventDefault();
            if (draggingCursor) {
                const xValue = oscilloscopeChart.scales.x.getValueForPixel(event.offsetX);
                const cursorAnnotation = oscilloscopeChart.options.plugins.annotation.annotations[draggingCursor];
                cursorAnnotation.xMin = xValue;
                cursorAnnotation.xMax = xValue;
                cursorAnnotation.label.content = `${draggingCursor.charAt(0).toUpperCase() + draggingCursor.slice(1)}: X = ${xValue.toFixed(2)}`;

                const rangeAnnotation = oscilloscopeChart.options.plugins.annotation.annotations.range;
                if (draggingCursor === 'cursor1') {
                    rangeAnnotation.xMin = xValue;
                } else if (draggingCursor === 'cursor2') {
                    rangeAnnotation.xMax = xValue;
                }
                rangeAnnotation.label.content = `${Math.abs(rangeAnnotation.xMin - rangeAnnotation.xMax).toFixed(2)} ms`;

                oscilloscopeChart.update();
            }
        });

        oscilloscopeCanvas.addEventListener('mouseup', (event) => {
            event.preventDefault();
            draggingCursor = null;
        });

        oscilloscopeCanvas.addEventListener('mouseleave', (event) => {
            event.preventDefault();
            draggingCursor = null;
        });

        oscilloscopeCanvas.addEventListener('touchstart', (event) => {
            event.preventDefault();
            const touch = event.touches[0];
            const xValue = oscilloscopeChart.scales.x.getValueForPixel(touch.clientX - oscilloscopeCanvas.getBoundingClientRect().left);
            const cursor1X = oscilloscopeChart.options.plugins.annotation.annotations.cursor1.xMin;
            const cursor2X = oscilloscopeChart.options.plugins.annotation.annotations.cursor2.xMin;

            if (Math.abs(xValue - cursor1X) < 0.1) {
                draggingCursor = 'cursor1';
            } else if (Math.abs(xValue - cursor2X) < 0.1) {
                draggingCursor = 'cursor2';
            }
        });

        oscilloscopeCanvas.addEventListener('touchmove', (event) => {
            event.preventDefault();
            if (draggingCursor) {
                const touch = event.touches[0];
                const xValue = oscilloscopeChart.scales.x.getValueForPixel(touch.clientX - oscilloscopeCanvas.getBoundingClientRect().left);
                const cursorAnnotation = oscilloscopeChart.options.plugins.annotation.annotations[draggingCursor];

                cursorAnnotation.xMin = xValue;
                cursorAnnotation.xMax = xValue;
                cursorAnnotation.label.content = `${draggingCursor.charAt(0).toUpperCase() + draggingCursor.slice(1)}: X = ${xValue.toFixed(2)}`;

                const rangeAnnotation = oscilloscopeChart.options.plugins.annotation.annotations.range;
                if (draggingCursor === 'cursor1') {
                    rangeAnnotation.xMin = xValue;
                } else if (draggingCursor === 'cursor2') {
                    rangeAnnotation.xMax = xValue;
                }
                rangeAnnotation.label.content = `${Math.abs(rangeAnnotation.xMin - rangeAnnotation.xMax).toFixed(2)} ms`;

                oscilloscopeChart.update();
            }
        });

        oscilloscopeCanvas.addEventListener('touchend', (event) => {
            event.preventDefault();
            draggingCursor = null;
        });
    </script>
</body>
</html>
