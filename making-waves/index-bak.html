<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Making Waves — Docs</title>
  <meta name="description" content="Making Waves - simulations and docs">
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root{
      --bg: #f7f9fb;
      --card: #ffffff;
      --muted: #6b7280;
      --accent: #0ea5a4;
      --text: #0f172a;
    }
    body { font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:var(--bg); color:var(--text); margin:0; overflow:auto; min-height:100vh; }
    .app-header { padding:18px 24px; display:flex; align-items:center; gap:12px; background: linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.4)); border-bottom:1px solid rgba(15,23,42,0.04); }
    .brand { font-weight:700; font-size:18px; color:var(--accent); }
    #app {
      width: 100%;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--card);
      box-shadow: 0 6px 18px rgba(12,20,31,0.04);
      border-radius: 10px;
      padding: 16px;
      overflow: auto;
    }
    .sidebar-nav a { color:var(--text); }
    .sidebar-nav a.active { color:var(--accent); font-weight:600; }
    pre { background:#0b1220; color:#e6eef6; padding:12px; border-radius:8px; overflow:auto; }
  </style>
</head>
<body>
  <div class="app-header">
    <div class="brand">Making Waves</div>
  </div>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'Making Waves',
      loadSidebar: true,
      subMaxLevel: 2,
      homepage: 'README.md',
      latex: {
        inlineMath  : [['$', '$'], ['\\(', '\\)']],
        displayMath : [['$$', '$$'], ['\\[', '\\]']]
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- MathJax v3 config MUST come before the MathJax script -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath  : [['$', '$'], ['\\(', '\\)']],
        displayMath : [['$$', '$$'], ['\\[', '\\]']],
        tags: 'ams'
      },
      options: {
        skipHtmlTags: ['script','noscript','style','textarea','pre']
      }
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <!-- Docsify LaTeX plugin (must come after both Docsify and MathJax) -->
  <script src="//cdn.jsdelivr.net/npm/docsify-latex@0"></script>
</body>
</html>
