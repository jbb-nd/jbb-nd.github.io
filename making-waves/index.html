  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root{
      --bg: #f7f9fb;
      --card: #ffffff;
      --muted: #6b7280;
      --accent: #0ea5a4;
      --text: #0f172a;
    }
    body { font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:var(--bg); color:var(--text); margin:0; }
    .app-header { padding:18px 24px; display:flex; align-items:center; gap:12px; background: linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.4)); border-bottom:1px solid rgba(15,23,42,0.04); }
    .brand { font-weight:700; font-size:18px; color:var(--accent); }
    .subtitle { color:var(--muted); font-size:13px; }
    #app { max-width:1000px; margin:28px auto; background:var(--card); box-shadow:0 6px 18px rgba(12,20,31,0.04); border-radius:10px; padding:28px; }
    .sidebar-nav a { color:var(--text); }
    .sidebar-nav a.active { color:var(--accent); font-weight:600; }
    pre { background:#0b1220; color:#e6eef6; padding:12px; border-radius:8px; overflow:auto; }
  </style>
</head>

  <div class="app-header">
    <div class="brand">Making Waves</div>

      name: 'Making Waves',
